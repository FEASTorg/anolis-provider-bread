provider:
  name: bread-lab

hardware:
  bus_path: /dev/i2c-1
  query_delay_us: 10000
  timeout_ms: 100
  retry_count: 2

discovery:
  mode: manual
  addresses: [0x08, 0x09]

devices:
  - id: rlht0
    type: rlht
    label: Reactor Left Heater
    address: 0x08
  - id: dcmt0
    type: dcmt
    label: Conveyor Drive
    address: 0x09
